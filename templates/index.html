<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuemath AI Tutor Screener</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Tutor Screening Room</h1>
            <p id="status">Connecting...</p>
        </header>

        <main>
            <div id="interview-controls">
                <button id="start-btn">Start Interview</button>
                <button id="end-btn" disabled>End Interview</button>
            </div>

            <div id="chat-window">
                </div>
            
            <div id="evaluation-result" class="hidden">
                <h2>Evaluation Report</h2>
                <pre id="json-display"></pre>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/pipeline.js') }}"></script>
</body>
</html>
